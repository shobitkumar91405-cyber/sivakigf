<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Good Morning Madam Ji ☕</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600;700&family=Poppins:wght@300;400;600&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #fff1eb 0%, #ace0f9 100%);
            background: linear-gradient(-45deg, #ff9a9e, #fad0c4, #fad0c4, #ffd1ff);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        
        /* Container with Glassmorphism */
        .container {
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.18);
            padding: 40px 20px;
            border-radius: 30px;
            text-align: center;
            z-index: 10;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.15);
            width: 90%;
            max-width: 400px;
        }
        
        .coffee {
            font-size: 4.5rem;
            margin-bottom: 10px;
            display: inline-block;
            animation: coffeeFloat 3s ease-in-out infinite;
            filter: drop-shadow(0 5px 15px rgba(0,0,0,0.1));
        }
        
        @keyframes coffeeFloat {
            0%, 100% { transform: translateY(0) rotate(-5deg); }
            50% { transform: translateY(-15px) rotate(5deg); }
        }
        
        h1 {
            font-family: 'Dancing Script', cursive;
            font-size: 3.8rem;
            color: #d63384;
            margin-bottom: 10px;
            text-shadow: 2px 2px 8px rgba(255,255,255,0.8);
        }
        
        .message {
            font-size: 1.2rem;
            color: #5d4037;
            margin-bottom: 30px;
            font-weight: 400;
            line-height: 1.5;
        }

        .heart-icon {
            color: #ff4d6d;
            display: inline-block;
            animation: beat 0.8s infinite alternate;
        }

        @keyframes beat {
            to { transform: scale(1.3); }
        }
        
        .open-btn {
            background: linear-gradient(45deg, #ff4d6d, #ff758c);
            color: white;
            border: none;
            padding: 15px 35px;
            font-size: 1.1rem;
            font-weight: 600;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(255, 77, 109, 0.3);
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .open-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 15px 25px rgba(255, 77, 109, 0.5);
        }
        
        /* Optimized Hearts (Lag Free) */
        .heart {
            position: absolute;
            color: rgba(255, 77, 109, 0.6);
            font-size: 20px;
            pointer-events: none;
            z-index: 1;
            will-change: transform;
            animation: heartMove linear infinite;
        }
        
        @keyframes heartMove {
            0% { transform: translateY(110vh) scale(0.5); opacity: 0; }
            20% { opacity: 0.8; }
            100% { transform: translateY(-10vh) scale(1.2) rotate(360deg); opacity: 0; }
        }
        
        /* Video Modal */
        .video-modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        
        .video-container {
            width: 85%;
            max-width: 500px;
            border: 3px solid #ff758c;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 0 30px #ff758c;
        }
        
        video { width: 100%; display: block; }

        @media (max-width: 480px) {
            h1 { font-size: 3rem; }
            .message { font-size: 1.1rem; }
        }
    </style>
</head>
<body>

    <div id="heart-container"></div>
    
    <div class="container">
        <div class="coffee">☕</div>
        <h1>Good Morning</h1>
        <p class="message">
            Madam Ji <span class="heart-icon">❤️</span><br>
            Aapki muskurahat jaisa pyaara ho<br>
            aapka aaj ka din! ✨
        </p>
        <button class="open-btn" onclick="openVideo()">
            🌹 Kholiye Isse 🌹
        </button>
    </div>
    
    <div class="video-modal" id="videoModal" onclick="closeVideo()">
        <div class="video-container">
            <video id="romanticVideo" src="video1.mp4" loop playsinline>
                Your browser does not support video.
            </video>
        </div>
    </div>
    
    <script>
        // Lag-free hearts creation
        function createHearts() {
            const container = document.getElementById('heart-container');
            const heartIcons = ['❤️', '💖', '🌸', '✨', '🌹'];
            
            for (let i = 0; i < 15; i++) { // Limited count for performance
                const heart = document.createElement('div');
                heart.className = 'heart';
                heart.innerHTML = heartIcons[Math.floor(Math.random() * heartIcons.length)];
                
                const leftPos = Math.random() * 100;
                const duration = 5 + Math.random() * 5;
                const delay = Math.random() * 5;
                
                heart.style.left = leftPos + 'vw';
                heart.style.animationDuration = duration + 's';
                heart.style.animationDelay = delay + 's';
                heart.style.fontSize = (15 + Math.random() * 15) + 'px';
                
                container.appendChild(heart);
            }
        }
        
        function openVideo() {
            const modal = document.getElementById('videoModal');
            const video = document.getElementById('romanticVideo');
            modal.style.display = 'flex';
            video.play().catch(e => console.log("Auto-play blocked, playing on interaction"));
        }
        
        function closeVideo() {
            const modal = document.getElementById('videoModal');
            const video = document.getElementById('romanticVideo');
            modal.style.display = 'none';
            video.pause();
        }
        
        // Initialize
        createHearts();
    </script>
</body>
</html>
